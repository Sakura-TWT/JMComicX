name: Android Release APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      JMX_RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/app/signing/jmx-release.keystore
      JMX_RELEASE_STORE_PASSWORD: ${{ secrets.JMX_RELEASE_STORE_PASSWORD }}
      JMX_RELEASE_KEY_ALIAS: ${{ secrets.JMX_RELEASE_KEY_ALIAS }}
      JMX_RELEASE_KEY_PASSWORD: ${{ secrets.JMX_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-37" "build-tools;37.0.0"

      - name: Restore release signing key
        shell: bash
        env:
          JMX_RELEASE_KEYSTORE_BASE64: ${{ secrets.JMX_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$JMX_RELEASE_KEYSTORE_BASE64"
          test -n "$JMX_RELEASE_STORE_PASSWORD"
          test -n "$JMX_RELEASE_KEY_ALIAS"
          test -n "$JMX_RELEASE_KEY_PASSWORD"
          mkdir -p "$(dirname "$JMX_RELEASE_KEYSTORE_FILE")"
          printf '%s' "$JMX_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$JMX_RELEASE_KEYSTORE_FILE"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Test and build release APK
        run: ./gradlew :core:test :app:testDebugUnitTest :app:lintRelease :app:assembleRelease --no-daemon

      - name: Verify and name release APK
        shell: bash
        run: |
          set -euo pipefail
          source version.properties
          APK="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' -print -quit)"
          test -n "$APK"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          mkdir -p artifacts
          cp "$APK" "artifacts/JMComicX-v${VERSION_NAME}-release.apk"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: JMComicX-release-${{ github.sha }}
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 14
